name: Build Frienemies Site

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Show dist contents
        run: ls -la dist

      - name: Upload dist output
        uses: actions/upload-artifact@v4
        with:
          name: frienemies-dist
          path: dist
